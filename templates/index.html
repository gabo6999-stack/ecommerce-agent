<!DOCTYPE html>
<html>
<head>
<title>Agente SEO</title>
<style>
body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px;background:#f5f5f5}
h2{color:#1a1a2e}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn{padding:8px 14px;background:white;color:#1a56db;border:1px solid #c5d5f5;border-radius:8px;cursor:pointer;font-size:13px}
.btn:hover{background:#e8f0fe}
.btn-danger{color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#fef2f2}
#chat{background:white;border:1px solid #ddd;min-height:400px;max-height:500px;overflow-y:auto;padding:20px;border-radius:12px;margin-bottom:12px}
.user{color:#1a56db;margin:10px 0 4px;font-weight:bold}
.agent{color:#057a55;margin:4px 0 10px;white-space:pre-wrap;line-height:1.6}
.loading{color:#999;font-style:italic}
.row{display:flex;gap:8px}
input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
#btn-send{padding:12px 24px;background:#1a56db;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px}
#btn-send:disabled{background:#93c5fd;cursor:not-allowed}
.memory-badge{font-size:11px;background:#e8f0fe;color:#1a56db;padding:2px 8px;border-radius:12px;margin-left:8px}
</style>
</head>
<body>
<h2>Agente SEO - peptidosysuplementos.mx <span class="memory-badge" id="memory-status">cargando memoria...</span></h2>
<div class="toolbar">
  <button class="btn" onclick="q('Muestrame los 10 productos con sus titulos y descripciones cortas actuales')">Ver productos</button>
  <button class="btn" onclick="q('Analiza y optimiza titulos y descripciones cortas de todos mis productos')">Optimizar productos</button>
  <button class="btn" onclick="q('Muestrame mis categorias y optimiza sus nombres y descripciones para SEO')">Optimizar categorias</button>
  <button class="btn" onclick="q('Muestrame los blogs publicados')">Ver blogs</button>
  <button class="btn" onclick="q('Que cambios has hecho hasta ahora? Muestra el historial completo')">Ver historial</button>
  <button class="btn btn-danger" onclick="clearChat()">Nueva sesion</button>
</div>
<div id="chat"></div>
<div class="row">
  <input id="inp" placeholder="Escribe una instruccion SEO..." onkeydown="if(event.key==='Enter')enviar()">
  <button id="btn-send" onclick="enviar()">Enviar</button>
</div>
<script>
var SESSION_ID = localStorage.getItem('seo_session') || 'session_' + Date.now();
localStorage.setItem('seo_session', SESSION_ID);

var chatHistory = JSON.parse(localStorage.getItem('seo_chat_' + SESSION_ID) || '[]');
var busy = false;

window.onload = function() {
  var chat = document.getElementById('chat');
  chatHistory.forEach(function(m) {
    if (typeof m.content !== 'string') return;
    var p = document.createElement('p');
    if (m.role === 'user') {
      p.className = 'user';
      p.textContent = 'Tu: ' + m.content;
    } else {
      p.className = 'agent';
      p.textContent = 'Agente: ' + m.content;
    }
    chat.appendChild(p);
  });
  chat.scrollTop = chat.scrollHeight;
  loadMemoryStatus();
};

function loadMemoryStatus() {
  fetch('/memory')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var count = Object.keys(d.instructions || {}).length + (d.decisions || []).length;
      document.getElementById('memory-status').textContent = count + ' memorias guardadas';
    })
    .catch(function(){ document.getElementById('memory-status').textContent = 'sin memoria'; });
}

function clearChat() {
  if (!confirm('Iniciar nueva sesion? El historial de esta sesion se borrara.')) return;
  fetch('/memory/clear', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session_id: SESSION_ID})
  }).then(function(){
    SESSION_ID = 'session_' + Date.now();
    localStorage.setItem('seo_session', SESSION_ID);
    chatHistory = [];
    localStorage.setItem('seo_chat_' + SESSION_ID, '[]');
    document.getElementById('chat').innerHTML = '';
    loadMemoryStatus();
  });
}

function q(t) { if(busy)return; document.getElementById('inp').value=t; enviar(); }

function enviar() {
  if (busy) return;
  var msg = document.getElementById('inp').value.trim();
  if (!msg) return;
  busy = true;
  document.getElementById('btn-send').disabled = true;
  document.getElementById('inp').value = '';

  chatHistory.push({role: 'user', content: msg});
  localStorage.setItem('seo_chat_' + SESSION_ID, JSON.stringify(chatHistory));

  var chat = document.getElementById('chat');
  var u = document.createElement('p'); u.className = 'user'; u.textContent = 'Tu: ' + msg; chat.appendChild(u);
  var l = document.createElement('p'); l.className = 'loading'; l.id = 'load'; l.textContent = 'Consultando...'; chat.appendChild(l);
  chat.scrollTop = chat.scrollHeight;

  fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session_id: SESSION_ID, messages: chatHistory})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    document.getElementById('load').remove();
    var reply = d.reply || 'Sin respuesta';
    chatHistory.push({role: 'assistant', content: reply});
    localStorage.setItem('seo_chat_' + SESSION_ID, JSON.stringify(chatHistory));
    var a = document.createElement('p'); a.className = 'agent'; a.textContent = 'Agente: ' + reply; chat.appendChild(a);
    chat.scrollTop = chat.scrollHeight;
    loadMemoryStatus();
    busy = false; document.getElementById('btn-send').disabled = false;
  })
  .catch(function(e){
    document.getElementById('load').remove();
    var a = document.createElement('p'); a.className = 'agent'; a.style.color = 'red'; a.textContent = 'Error: ' + e.message; chat.appendChild(a);
    busy = false; document.getElementById('btn-send').disabled = false;
  });
}
</script>
</body>
</html>
